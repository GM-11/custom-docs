apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customdocs-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - 52.224.224.177.nip.io
    secretName: customdocs-tls
  rules:
    - host: 52.224.224.177.nip.io
      http:
        paths:
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: authentication-service
                port:
                  number: 8082
          - path: /api/docs(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: docmanager-service
                port:
                  number: 8081
          - path: /ws(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: connection-manager-service
                port:
                  number: 8080
